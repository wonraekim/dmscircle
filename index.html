<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMS Circle | Thinking Website</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <section class="card" id="quizCard">
      <p class="label">DMS Circle Thinking Test</p>

      <h1 id="currentWord">GLOBAL</h1>
      <div class="arrow">↓</div>

      <input 
        id="answerInput" 
        type="text" 
        placeholder="정반대 개념을 입력하세요" 
        autocomplete="off"
      />

      <button id="nextBtn">WHY?</button>

      <p class="hint" id="hintText">
        예: GLOBAL의 반대는 무엇일까요?
      </p>
    </section>

    <section class="result hidden" id="resultBox">
      <p class="label">You just experienced DMS Circle</p>

      <h2>당신은 방금<br>DMS Circle을 경험했습니다.</h2>

      <p>
        성장은 더 많은 일을 하는 것에서 시작되지 않습니다.<br>
        먼저 <strong>무엇을 바꿔야 하는가</strong>를 찾는 것에서 시작됩니다.
      </p>

      <div class="summary" id="summaryList"></div>

      <a href="#contact" class="cta">Next Market 진단 문의</a>
    </section>

    <section class="contact" id="contact">
      <h2>문의</h2>
      <p><strong>김원래</strong> | DMS Circle</p>
      <p>010-6271-4206</p>
      <p>info@genesci.co.kr</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
